# ==================== 3. PORT 8443: ADGUARD DASHBOARD PROXY (BARE DOMAIN) ====================
server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name YOUR_DOMAIN.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://10.66.66.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ==================== 4. PORT 8443: ADGUARD DASHBOARD PROXY (WILDCARD SUBDOMAINS) ====================
server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name *.YOUR_DOMAIN.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.duckdns.org/privkey.pem;
