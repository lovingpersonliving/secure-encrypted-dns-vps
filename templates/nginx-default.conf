# ==================== 5. PORT 80: HTTP REDIRECT TO HTTPS ====================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name YOUR_DOMAIN.duckdns.org *.YOUR_DOMAIN.duckdns.org;

    # Wildcard redirect to secure HTTPS connection
    return 301 https://$host$request_uri;
}
