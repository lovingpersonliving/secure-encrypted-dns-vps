# ==================== 1. PORT 443: BARE DOMAIN (YOUR_DOMAIN.duckdns.org) ====================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN.duckdns.org;

    root /var/www/html;
    index index.html;

    # Proxy DoH /dns-query requests to AdGuard Home internal DoH port
    location /dns-query {
        proxy_pass https://10.66.66.1:8444/dns-query;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static frontend web files
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ =404;
    }

    # Proxy to Python stats API daemon
    location /api/stats {
        proxy_pass http://127.0.0.1:8085/api/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSL configuration (Certbot paths)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

