# ==================== 5. PORT 80: HTTP REDIRECT TO HTTPS ====================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name dnsmalik.duckdns.org *.dnsmalik.duckdns.org;

    if ($host = home.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
    if ($host = tablet.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
    if ($host = phone.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
