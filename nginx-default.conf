    if ($host = ios.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
    if ($host = android.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
    if ($host = tv.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
    if ($host = laptop.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
    if ($host = ipad.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
    if ($host = brother.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
    if ($host = sister.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
