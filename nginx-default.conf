# ==================== 1. PORT 443: BARE DOMAIN (dnsmalik.duckdns.org) ====================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dnsmalik.duckdns.org;

    root /var/www/html;
    index index.html;

    location /dns-query {
        proxy_pass https://10.66.66.1:8444/dns-query;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ =404;
    }

    location /api/stats {
        proxy_pass http://127.0.0.1:8085/api/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /vnc {
        auth_basic "LXDE Desktop Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        rewrite ^/vnc/(.*) /$1 break;
        rewrite ^/vnc$ /vnc.html break;

        proxy_pass http://localhost:6080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /websockify {
        auth_basic "LXDE Desktop Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://localhost:6080/websockify;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    ssl_certificate /etc/letsencrypt/live/dnsmalik.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dnsmalik.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

