    if ($host = windows.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
    if ($host = mac.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
    if ($host = iphone.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
    if ($host = musab.dnsmalik.duckdns.org) { return 301 https://$host$request_uri; }
